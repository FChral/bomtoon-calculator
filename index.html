<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomtoon TW 優儲計算機</title>
    <!-- 引入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .transition-all-custom { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [exchangeRate] = useState(4.29);
            const [currency, setCurrency] = useState('HKD');
            const [inputValue, setInputValue] = useState('');
            const [targetC, setTargetC] = useState('');
            const [selectedSolutionIdx, setSelectedSolutionIdx] = useState(null);
            
            const getTaiwanTime = () => {
                const now = new Date();
                const tzString = now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' });
                return new Date(tzString);
            };

            const [currentTime, setCurrentTime] = useState(getTaiwanTime());
            const [activeTask, setActiveTask] = useState(null);

            // 優儲生效日期設定
            const promotionDates = ["2026-04-02"]; // 已知日期
            const nextPromotionDate = ["2026-05-01"]; // 下次未定，抓到後可填入如 "2026-05-01"

            const isPromotionDay = useMemo(() => {
                const y = currentTime.getFullYear();
                const m = String(currentTime.getMonth() + 1).padStart(2, '0');
                const d = String(currentTime.getDate()).padStart(2, '0');
                const todayStr = `${y}-${m}-${d}`;
                return promotionDates.includes(todayStr) || todayStr === nextPromotionDate;
            }, [currentTime]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(getTaiwanTime()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                setSelectedSolutionIdx(null);
            }, [inputValue, targetC]);

            const offers = [
                { id: 'offerA', name: '489 方案', time: '全日限定', startTime: 0, endTime: 24, twd: 489, totalC: 180, baseC: 90, freeC: 90 },
                { id: 'offerB', name: '786 方案', time: '20:00 - 21:59', startTime: 20, endTime: 22, twd: 786, totalC: 290, baseC: 150, freeC: 140 }
            ];

            const isCurrentlyClickable = (offer) => {
                if (!isPromotionDay) return false;
                const hours = currentTime.getHours();
                const minutes = currentTime.getMinutes();
                const timeInDecimal = hours + minutes / 60;
                return timeInDecimal >= offer.startTime && timeInDecimal < offer.endTime;
            };

            const isNotExpiredYet = (offer) => {
                // 如果不是活動當天，視為「未開始」而非「已過期」，讓計算機能計算但按鈕鎖定
                if (!isPromotionDay) return true; 
                const hours = currentTime.getHours();
                const minutes = currentTime.getMinutes();
                return (hours + minutes / 60) < offer.endTime;
            };

            const calculableOffers = useMemo(() => offers, []); // 永遠可計算

            const offerStats = useMemo(() => offers.map(o => {
                const hkdCost = o.twd / exchangeRate;
                const isAvailableNow = isCurrentlyClickable(o);
                const isExpired = isPromotionDay && !isNotExpiredYet(o);
                const costPerC = currency === 'HKD' ? (hkdCost / o.totalC) : (o.twd / o.totalC);
                return { ...o, hkdCost, isAvailableNow, isExpired, costPerC };
            }), [currency, currentTime, exchangeRate, isPromotionDay]);

            const bestOffer = useMemo(() => {
                return [...offerStats].sort((a, b) => a.costPerC - b.costPerC)[0];
            }, [offerStats]);

            const calculateAllResults = (mode, val) => {
                if (!val || val <= 0) return null;
                const active = offers;
                let best = { totalC: 0, costTWD: 0, items: {}, title: "推薦搭配" };
                const flash = active.find(o => o.id === 'offerB');
                const normal = active.find(o => o.id === 'offerA');
                const budgetTWD = currency === 'HKD' ? val * exchangeRate : val;

                if (mode === 'budget') {
                    const maxF = flash ? Math.floor(budgetTWD / flash.twd) : 0;
                    for (let f = 0; f <= maxF; f++) {
                        let rem = budgetTWD - (f * (flash?.twd || 0));
                        let n = normal ? Math.floor(rem / normal.twd) : 0;
                        const curC = (f * (flash?.totalC || 0)) + (n * (normal?.totalC || 0));
                        const curTWD = (f * (flash?.twd || 0)) + (n * (normal?.twd || 0));
                        if (curC > best.totalC) best = { totalC: curC, costTWD: curTWD, items: { [flash?.id]: f, [normal?.id]: n }, title: "最佳搭配" };
                    }
                } else {
                    let minTWD = Infinity;
                    const maxF = flash ? Math.ceil(val / flash.totalC) : 0;
                    const maxN = normal ? Math.ceil(val / (normal?.totalC || 1)) : 0;
                    for (let f = 0; f <= maxF; f++) {
                        for (let n = 0; n <= maxN; n++) {
                            const curC = (f * (flash?.totalC || 0)) + (n * (normal?.totalC || 0));
                            const curTWD = (f * (flash?.twd || 0)) + (n * (normal?.twd || 0));
                            if (curC >= val && curTWD < minTWD) {
                                minTWD = curTWD;
                                best = { totalC: curC, costTWD: curTWD, items: { [flash?.id]: f, [normal?.id]: n }, title: "最省搭配" };
                            }
                        }
                    }
                }

                best.actualCostHKD = best.costTWD / exchangeRate;
                best.avgPrice = currency === 'HKD' ? (best.actualCostHKD / best.totalC) : (best.costTWD / best.totalC);
                best.itemList = Object.entries(best.items).filter(([_, c]) => c > 0).map(([id, c]) => ({ count: c, name: offers.find(off => off.id === id).name, id }));

                const singleCompare = offers.map(o => {
                    let count = mode === 'budget' ? Math.floor(budgetTWD / o.twd) : Math.ceil(val / o.totalC);
                    const totalC = count * o.totalC;
                    const costTWD = count * o.twd;
                    const actualCostHKD = costTWD / exchangeRate;
                    const diff = currency === 'HKD' ? (actualCostHKD - best.actualCostHKD) : (costTWD - best.costTWD);
                    return { 
                        title: `單儲 ${o.name}`, name: o.name, count, totalC, costTWD, actualCostHKD, diff,
                        avgPrice: currency === 'HKD' ? (actualCostHKD / totalC) : (costTWD / totalC),
                        itemList: [{ count, name: o.name, id: o.id }]
                    };
                });
                return { best, alternatives: singleCompare };
            };

            const results = useMemo(() => {
                if (inputValue) return calculateAllResults('budget', inputValue);
                if (targetC) return calculateAllResults('target', targetC);
                return null;
            }, [inputValue, targetC, currency, exchangeRate]);

            const currentDisplaySolution = useMemo(() => {
                if (!results) return null;
                return selectedSolutionIdx === null ? results.best : results.alternatives[selectedSolutionIdx];
            }, [results, selectedSolutionIdx]);

            const startTask = (res) => {
                if (!isPromotionDay) return;
                const items = res.itemList.map(it => {
                    const o = offers.find(off => off.id === it.id);
                    return { ...it, total: it.count, remaining: it.count, perUnitC: o.totalC, startTime: o.startTime, endTime: o.endTime };
                });
                setActiveTask({ items, totalGoalC: res.totalC });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const trackStep = (id) => {
                setActiveTask(prev => ({
                    ...prev,
                    items: prev.items.map(it => it.id === id && it.remaining > 0 ? { ...it, remaining: it.remaining - 1 } : it)
                }));
            };

            const currentTotalC = useMemo(() => activeTask?.items.reduce((acc, it) => acc + (it.total - it.remaining) * it.perUnitC, 0) || 0, [activeTask]);
            const isAllCompleted = useMemo(() => activeTask?.items.length > 0 && activeTask.items.every(it => it.remaining === 0), [activeTask]);

            const MainResultCard = ({ res }) => {
                if (!res) return null;
                const isAlternative = selectedSolutionIdx !== null;

                return (
                    <div className="mt-4 p-4 bg-pink-50/50 rounded-2xl border border-pink-200 shadow-sm transition-all-custom">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <p className="text-[10px] font-bold text-pink-400 uppercase tracking-widest flex items-center gap-1">
                                    <Icon name={isAlternative ? "layers" : "sparkles"} size={10} />
                                    {res.title}
                                </p>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-3xl font-black text-pink-600">{res.totalC}</span>
                                    <span className="text-xs font-bold text-pink-400 uppercase tracking-tighter">C</span>
                                </div>
                                <div className="mt-1 flex flex-col gap-1">
                                    <div className="px-2 py-0.5 bg-pink-100/50 border border-pink-200 rounded text-[10px] font-bold text-pink-500 inline-block">
                                        均價：{currency} {res.avgPrice.toFixed(3)}/C
                                    </div>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">實際支出</p>
                                <p className="text-xl font-black text-slate-700">
                                    {currency === 'HKD' ? `$${(res.actualCostHKD || 0).toFixed(2)}` : `${res.costTWD || 0} TWD`}
                                </p>
                            </div>
                        </div>

                        <div className="space-y-2 mb-4">
                            {res.itemList.map((it, i) => (
                                <div key={i} className="flex justify-between items-center bg-white/80 px-3 py-2 rounded-xl text-sm font-bold border border-white shadow-sm">
                                    <span className="text-slate-600">{it.name}</span>
                                    <span className="text-pink-500 bg-pink-50 px-2 py-0.5 rounded-lg">x {it.count} 次</span>
                                </div>
                            ))}
                        </div>

                        {!isPromotionDay ? (
                            <div className="space-y-2">
                                <button disabled className="w-full bg-slate-200 text-slate-400 font-black py-4 rounded-2xl flex justify-center items-center gap-3 text-sm cursor-not-allowed">
                                    <Icon name="lock" size={20} /> 目前非優儲活動日
                                </button>
                                <p className="text-[10px] text-center text-orange-500 font-bold px-4">
                                    請密切留意 BomtoonTW 官網/IG/Threads/X 公告下一次優儲日期方可解鎖執行功能。
                                </p>
                            </div>
                        ) : (
                            <button onClick={() => startTask(res)} className="w-full bg-pink-500 hover:bg-pink-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-pink-500/20 flex justify-center items-center gap-3 text-sm active:scale-95 transition-all">
                                <Icon name="play-circle" size={20} /> 開始執行此方案
                            </button>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 pb-24 mx-auto max-w-md">
                    <div className="mb-6 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold text-pink-600 tracking-tight">Bomtoon TW 優儲計算機</h1>
                            <div className="flex items-center gap-2 text-[10px] text-slate-500 font-bold">
                                <span className="bg-pink-100 text-pink-600 px-1.5 py-0.5 rounded">TAIWAN TIME</span>
                                {currentTime.toLocaleTimeString('en-GB')}
                            </div>
                        </div>
                        <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                            {['HKD', 'TWD'].map(c => (
                                <button key={c} onClick={() => setCurrency(c)} className={`px-4 py-1.5 text-xs font-black rounded-lg transition-all ${currency === c ? 'bg-pink-500 text-white shadow-md' : 'text-slate-400'}`}>{c}</button>
                            ))}
                        </div>
                    </div>

                    {activeTask && (
                        <div className="mb-6 bg-slate-900 text-white p-5 rounded-3xl shadow-2xl border border-slate-700 animate-in zoom-in-95 duration-300">
                            <div className="flex justify-between mb-4">
                                <h2 className="font-bold flex items-center gap-2 text-pink-400"><Icon name="zap" size={18} /> 儲值任務執行中</h2>
                                <button onClick={() => setActiveTask(null)} className="text-slate-500 hover:text-white transition-colors"><Icon name="x-circle" size={20} /></button>
                            </div>
                            <div className="mb-5 bg-slate-800/50 p-4 rounded-2xl text-center border border-slate-700/30">
                                <div className="text-[10px] text-slate-400 uppercase tracking-widest mb-1">進度：{currentTotalC} / {activeTask.totalGoalC} C</div>
                                <div className="text-3xl font-black tabular-nums">{currentTotalC} <span className="text-slate-500 text-xs">C</span></div>
                                <div className="mt-3 h-2.5 bg-slate-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-pink-600 to-pink-400 transition-all duration-1000 shadow-[0_0_10px_rgba(219,39,119,0.5)]" style={{ width: `${(currentTotalC/activeTask.totalGoalC)*100}%` }} />
                                </div>
                            </div>
                            <div className="space-y-3">
                                {activeTask.items.map(it => {
                                    const can = isCurrentlyClickable(it);
                                    return (
                                        <div key={it.id} className={`p-4 rounded-2xl border transition-all ${it.remaining === 0 ? 'bg-green-500/10 border-green-500/30 opacity-60' : (can ? 'bg-slate-800 border-slate-700 shadow-md' : 'bg-slate-900 border-slate-800 opacity-50')}`}>
                                            <div className="flex justify-between items-center">
                                                <div className="flex-1 text-left">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${it.remaining === 0 ? 'bg-green-500 text-white' : (can ? 'bg-pink-500 text-white' : 'bg-slate-700')}`}>{it.remaining === 0 ? '已清' : (can ? '可點擊' : '未到時間')}</span>
                                                        <span className="text-xs text-slate-300 font-bold">{it.name}</span>
                                                    </div>
                                                    <div className="text-lg font-black italic">剩餘 {it.remaining} 次</div>
                                                </div>
                                                <button onClick={() => trackStep(it.id)} disabled={it.remaining === 0 || !can} className={`w-12 h-12 flex items-center justify-center rounded-2xl transition-all ${it.remaining > 0 && can ? 'bg-pink-500 hover:bg-pink-400 active:scale-90 shadow-lg shadow-pink-500/30' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
                                                    {it.remaining === 0 ? <Icon name="check" size={24} className="text-green-400" /> : <Icon name={can ? "mouse-pointer-2" : "lock"} size={22} />}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    <div className="mb-6 grid grid-cols-2 gap-3">
                        {offerStats.map(o => {
                            const isBest = bestOffer?.id === o.id;
                            const isLocked = !isPromotionDay;
                            return (
                                <div key={o.id} className={`relative p-3 rounded-2xl bg-white border-2 transition-all duration-300 ${o.isExpired ? 'opacity-40 grayscale border-transparent' : 'border-transparent shadow-sm hover:shadow-md'}`}>
                                    {isBest && !o.isExpired && (
                                        <div className="absolute top-2 right-2 text-[8px] font-black text-pink-500 bg-pink-50 px-1.5 py-0.5 rounded-md uppercase tracking-tighter">最優惠</div>
                                    )}
                                    <div className="flex justify-center gap-1 text-[9px] font-bold uppercase mb-1">
                                        <Icon name={o.isAvailableNow ? "clock" : "lock"} size={10} className={o.isAvailableNow ? "text-pink-500" : "text-slate-400"} />
                                        {o.time}
                                    </div>
                                    <div className="text-xs font-bold text-slate-500">{o.name}</div>
                                    <div className="flex items-baseline gap-1 my-1">
                                        <div className="text-2xl font-black leading-none">{o.totalC} <span className="text-[10px] font-normal text-slate-400 tracking-tighter">C</span></div>
                                        <div className="text-[8px] text-pink-400 font-bold leading-none truncate">(含 {o.freeC} 免費)</div>
                                    </div>
                                    <div className={`text-[10px] font-black py-1.5 rounded-lg text-center flex flex-col items-center justify-center gap-0.5 ${o.isAvailableNow ? 'bg-pink-50 text-pink-600' : 'bg-slate-100 text-slate-400'}`}>
                                        <span>{isLocked ? '等待公告日期' : (o.isExpired ? '今日已完' : (o.isAvailableNow ? '已開賣' : '待解鎖'))}</span>
                                        <span className="text-[8px] opacity-70">{currency}: {o.costPerC.toFixed(3)}/C</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="space-y-4">
                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <div className="flex items-center gap-2 mb-4 text-pink-600 font-black text-sm uppercase tracking-widest"><Icon name="wallet" size={16} /> 預算/目標</div>
                            <div className="relative mb-4">
                                <input type="number" placeholder={`輸入預算 ${currency}`} value={inputValue} onChange={e => {setInputValue(e.target.value); setTargetC('');}} className="w-full bg-slate-50 p-4 pr-12 rounded-2xl text-xl font-black outline-none focus:ring-2 ring-pink-100 transition-all placeholder:text-slate-300" />
                                <span className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 font-black text-sm tracking-widest">{currency}</span>
                            </div>
                            <div className="relative">
                                <input type="number" placeholder="或是目標點數 (C)" value={targetC} onChange={e => {setTargetC(e.target.value); setInputValue('');}} className="w-full bg-slate-50 p-4 pr-12 rounded-2xl text-xl font-black outline-none focus:ring-2 ring-slate-200 transition-all placeholder:text-slate-300" />
                                <span className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 font-black text-sm tracking-widest">C</span>
                            </div>

                            {results && (
                                <div className="mt-4 animate-in fade-in slide-in-from-top-2 duration-500">
                                    <MainResultCard res={currentDisplaySolution} />
                                    <div className="mt-4 grid grid-cols-2 gap-3">
                                        {selectedSolutionIdx !== null && (
                                            <div onClick={() => setSelectedSolutionIdx(null)} className="p-3 bg-white rounded-2xl border-2 border-pink-200 shadow-sm cursor-pointer text-center">
                                                <p className="text-[9px] font-bold text-pink-500 uppercase mb-1">← 返回推薦</p>
                                                <p className="text-lg font-black text-pink-600">{results.best.totalC} C</p>
                                            </div>
                                        )}
                                        {results.alternatives.map((alt, idx) => {
                                            if (selectedSolutionIdx === idx) return null;
                                            return (
                                                <div key={idx} onClick={() => setSelectedSolutionIdx(idx)} className="p-3 bg-slate-50 rounded-2xl border border-slate-200 cursor-pointer text-center">
                                                    <p className="text-[9px] font-bold text-slate-400 uppercase mb-1">單儲 {alt.name}</p>
                                                    <p className="text-lg font-black text-slate-600">{alt.totalC} C</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <div className="mt-8 px-4 text-center">
                        <p className="text-[10px] text-slate-400 font-bold leading-relaxed tracking-tight">
                            💡 提示：非優儲活動日時，系統僅提供計算功能。<br/>
                            請隨時注意 BomtoonTW 官方公告解鎖時間。
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
