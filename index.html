<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomtoon TW 儲值計算器</title>
    <!-- 引入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [exchangeRate] = useState(4.29);
            const [currency, setCurrency] = useState('HKD');
            const [inputValue, setInputValue] = useState('');
            const [targetC, setTargetC] = useState('');
            
            const getTaiwanTime = () => {
                const now = new Date();
                const tzString = now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' });
                return new Date(tzString);
            };

            const [currentTime, setCurrentTime] = useState(getTaiwanTime());
            const [activeTask, setActiveTask] = useState(null);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(getTaiwanTime()), 1000);
                return () => clearInterval(timer);
            }, []);

            const offers = [
                { id: 'offerA', name: '489 方案', time: '全日限定', startTime: 0, endTime: 24, twd: 489, totalC: 180 },
                { id: 'offerB', name: '786 方案', time: '20:00 - 21:59', startTime: 20, endTime: 22, twd: 786, totalC: 290 }
            ];

            const isCurrentlyClickable = (offer) => {
                const hours = currentTime.getHours();
                const minutes = currentTime.getMinutes();
                const timeInDecimal = hours + minutes / 60;
                return timeInDecimal >= offer.startTime && timeInDecimal < offer.endTime;
            };

            const isNotExpiredYet = (offer) => {
                const hours = currentTime.getHours();
                const minutes = currentTime.getMinutes();
                return (hours + minutes / 60) < offer.endTime;
            };

            const calculableOffers = useMemo(() => offers.filter(o => isNotExpiredYet(o)), [currentTime]);

            const offerStats = useMemo(() => offers.map(o => {
                const hkdCost = o.twd / exchangeRate;
                const isAvailableNow = isCurrentlyClickable(o);
                const isExpired = !isNotExpiredYet(o);
                const costPerC = currency === 'HKD' ? hkdCost / o.totalC : o.twd / o.totalC;
                const hkdPerC = hkdCost / o.totalC;
                
                return { ...o, hkdCost, isAvailableNow, isExpired, costPerC, hkdPerC };
            }), [currency, currentTime, exchangeRate]);

            const bestOffer = useMemo(() => {
                const valid = offerStats.filter(o => !o.isExpired);
                return valid.length > 0 ? [...valid].sort((a, b) => a.costPerC - b.costPerC)[0] : null;
            }, [offerStats]);

            const calculateBestResult = (mode, val) => {
                if (!val || val <= 0 || calculableOffers.length === 0) return null;
                const active = calculableOffers;
                let best = { totalC: 0, costTWD: 0, items: {} };
                
                const flash = active.find(o => o.id === 'offerB');
                const normal = active.find(o => o.id === 'offerA');

                if (mode === 'budget') {
                    const budgetTWD = currency === 'HKD' ? val * exchangeRate : val;
                    const maxF = flash ? Math.floor(budgetTWD / flash.twd) : 0;
                    for (let f = 0; f <= maxF; f++) {
                        let rem = budgetTWD - (f * (flash?.twd || 0));
                        let n = normal ? Math.floor(rem / normal.twd) : 0;
                        const curC = (f * (flash?.totalC || 0)) + (n * (normal?.totalC || 0));
                        const curTWD = (f * (flash?.twd || 0)) + (n * (normal?.twd || 0));
                        if (curC > best.totalC) best = { totalC: curC, costTWD: curTWD, items: { [flash?.id]: f, [normal?.id]: n } };
                    }
                } else {
                    let minTWD = Infinity;
                    const maxF = flash ? Math.ceil(val / flash.totalC) : 0;
                    const maxN = normal ? Math.ceil(val / normal.totalC) : 0;
                    for (let f = 0; f <= maxF; f++) {
                        for (let n = 0; n <= maxN; n++) {
                            const curC = (f * (flash?.totalC || 0)) + (n * (normal?.totalC || 0));
                            const curTWD = (f * (flash?.twd || 0)) + (n * (normal?.twd || 0));
                            if (curC >= val && curTWD < minTWD) {
                                minTWD = curTWD;
                                best = { totalC: curC, costTWD: curTWD, items: { [flash?.id]: f, [normal?.id]: n } };
                            }
                        }
                    }
                }
                if (best.totalC === 0) return null;
                return { 
                    ...best, 
                    actualCostHKD: best.costTWD / exchangeRate,
                    itemList: Object.entries(best.items).filter(([_, c]) => c > 0).map(([id, c]) => ({ count: c, name: offers.find(o => o.id === id).name, id }))
                };
            };

            const budgetResult = useMemo(() => calculateBestResult('budget', inputValue), [inputValue, calculableOffers, currency, exchangeRate]);
            const targetResult = useMemo(() => calculateBestResult('target', targetC), [targetC, calculableOffers, currency, exchangeRate]);

            const startTask = (res) => {
                const items = res.itemList.map(it => {
                    const o = offers.find(off => off.id === it.id);
                    return { ...it, total: it.count, remaining: it.count, perUnitC: o.totalC, startTime: o.startTime, endTime: o.endTime };
                });
                setActiveTask({ items, totalGoalC: res.totalC });
            };

            const trackStep = (id) => {
                setActiveTask(prev => ({
                    ...prev,
                    items: prev.items.map(it => it.id === id && it.remaining > 0 ? { ...it, remaining: it.remaining - 1 } : it)
                }));
            };

            const currentTotalC = useMemo(() => activeTask?.items.reduce((acc, it) => acc + (it.total - it.remaining) * it.perUnitC, 0) || 0, [activeTask]);
            const isAllCompleted = useMemo(() => activeTask?.items.every(it => it.remaining === 0), [activeTask]);

            const ResultView = ({ res }) => {
                if (!res || !res.totalC || res.totalC === 0) return null;
                return (
                    <div className="mt-4 p-4 bg-pink-50/50 rounded-2xl border border-pink-100 animate-in fade-in slide-in-from-top-1 duration-300">
                        <div className="flex justify-between items-end mb-3">
                            <div>
                                <p className="text-[10px] font-bold text-pink-400 uppercase tracking-wider">預計獲得</p>
                                <p className="text-2xl font-black text-pink-600">{res.totalC} C</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">實際支出</p>
                                <p className="text-lg font-bold text-slate-700">
                                    {currency === 'HKD' ? `$${(res.actualCostHKD || 0).toFixed(2)}` : `${res.costTWD || 0} TWD`}
                                </p>
                            </div>
                        </div>
                        <div className="space-y-2 mb-4">
                            {(res.itemList || []).map((it, i) => (
                                <div key={i} className="flex justify-between bg-white/60 px-3 py-2 rounded-xl text-sm font-bold border border-white">
                                    <span>{it.name}</span>
                                    <span className="text-pink-500">x {it.count} 次</span>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => startTask(res)} className="w-full bg-pink-500 text-white font-black py-3 rounded-xl shadow-md flex justify-center gap-2 text-sm active:scale-95 transition-transform">
                            <Icon name="play-circle" size={18} /> 開始儲值任務
                        </button>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 pb-20 mx-auto max-w-md">
                    <div className="mb-6 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold text-pink-600">Bomtoon TW</h1>
                            <div className="flex items-center gap-2 text-[10px] text-slate-500 font-bold">
                                <span className="bg-pink-100 text-pink-600 px-1.5 py-0.5 rounded">TAIWAN TIME</span>
                                {currentTime.toLocaleTimeString('en-GB')}
                            </div>
                        </div>
                        <div className="flex bg-white p-1 rounded-lg shadow-sm border border-slate-100">
                            {['HKD', 'TWD'].map(c => (
                                <button key={c} onClick={() => setCurrency(c)} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${currency === c ? (c === 'HKD' ? 'bg-pink-500 text-white' : 'bg-blue-500 text-white') : 'text-slate-400'}`}>{c}</button>
                            ))}
                        </div>
                    </div>

                    <div className="mb-6 grid grid-cols-2 gap-3">
                        {offerStats.map(o => (
                            <div key={o.id} className={`p-3 rounded-2xl bg-white border-2 transition-all ${o.isExpired ? 'opacity-40 grayscale border-transparent' : (bestOffer?.id === o.id ? 'border-pink-500 shadow-lg' : 'border-transparent shadow-sm')}`}>
                                <div className="flex justify-center gap-1 text-[9px] font-bold uppercase mb-1">
                                    <Icon name={o.isAvailableNow ? "clock" : "lock"} size={10} className={o.isAvailableNow ? "text-pink-500 animate-pulse" : "text-slate-400"} />
                                    {o.time}
                                </div>
                                <div className="text-sm font-bold text-slate-600">{o.name}</div>
                                <div className="text-2xl font-black my-1">{o.totalC} <span className="text-xs font-normal">C</span></div>
                                <div className={`text-[9px] font-black py-1 rounded-lg ${o.isAvailableNow ? 'bg-pink-50 text-pink-600' : 'bg-slate-100 text-slate-400'}`}>
                                    {o.isExpired ? '今日已完' : (o.isAvailableNow ? `${currency}: ${o.costPerC.toFixed(3)}/C` : `待解鎖 (HKD: ${o.hkdPerC.toFixed(3)}/C)`)}
                                </div>
                            </div>
                        ))}
                    </div>

                    {activeTask && (
                        <div className="mb-6 bg-slate-900 text-white p-5 rounded-3xl shadow-xl border border-slate-700 animate-in zoom-in-95 duration-200">
                            <div className="flex justify-between mb-5">
                                <h2 className="font-bold flex items-center gap-2 text-pink-400"><Icon name="zap" size={18} /> 任務執行中</h2>
                                <button onClick={() => setActiveTask(null)} className="text-slate-500 hover:text-white transition-colors"><Icon name="rotate-ccw" size={16} /></button>
                            </div>
                            <div className="mb-6 bg-slate-800/50 p-4 rounded-2xl text-center border border-slate-700/30">
                                <div className="text-[10px] text-slate-500 uppercase mb-1 tracking-widest">目標：{activeTask.totalGoalC} C</div>
                                <div className="text-3xl font-black">{currentTotalC} <span className="text-slate-500 text-sm">C</span></div>
                                <div className="mt-3 h-2 bg-slate-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-pink-600 to-pink-400 transition-all duration-700" style={{ width: `${(currentTotalC/activeTask.totalGoalC)*100}%` }} />
                                </div>
                            </div>
                            <div className="space-y-3">
                                {activeTask.items.map(it => {
                                    const can = isCurrentlyClickable(it);
                                    return (
                                        <div key={it.id} className={`p-4 rounded-2xl border transition-all ${it.remaining === 0 ? 'bg-green-500/10 border-green-500/50 opacity-60' : (can ? 'bg-slate-800 border-slate-700 shadow-md' : 'bg-slate-900 border-slate-800 opacity-50')}`}>
                                            <div className="flex justify-between items-center">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className={`text-[10px] font-black px-2 py-0.5 rounded-full ${it.remaining === 0 ? 'bg-green-500 text-white' : (can ? 'bg-pink-500 text-white' : 'bg-slate-700')}`}>{it.remaining === 0 ? '完成' : (can ? '可儲值' : '鎖定中')}</span>
                                                        <span className="text-xs text-slate-400 font-bold">{it.name}</span>
                                                    </div>
                                                    <div className="text-lg font-black">剩餘 {it.remaining} 次</div>
                                                </div>
                                                <button onClick={() => trackStep(it.id)} disabled={it.remaining === 0 || !can} className={`w-12 h-12 flex items-center justify-center rounded-2xl transition-all ${it.remaining > 0 && can ? 'bg-pink-500 hover:bg-pink-400 shadow-lg shadow-pink-500/20' : 'bg-slate-700 text-slate-500'}`}>
                                                    {it.remaining === 0 ? <Icon name="check-circle-2" size={24} className="text-green-400" /> : <Icon name={can ? "play-circle" : "lock"} size={24} />}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            {isAllCompleted && <div className="mt-6 p-4 bg-green-500 rounded-2xl text-center font-black flex justify-center gap-2 text-white animate-bounce shadow-lg shadow-green-500/20"><Icon name="award" size={20} /> 儲夠啦！任務達成！</div>}
                        </div>
                    )}

                    <div className="space-y-4">
                        <div className="bg-white p-5 rounded-3xl shadow-md border border-slate-100">
                            <div className="flex items-center gap-2 mb-4 text-pink-600 font-black text-sm uppercase tracking-wider"><Icon name="dollar-sign" size={16} /> 我有預算</div>
                            <div className="relative"><input type="number" placeholder={`預算 ${currency}...`} value={inputValue} onChange={e => {setInputValue(e.target.value); setTargetC('');}} className="w-full bg-slate-50 p-4 rounded-2xl text-lg font-bold outline-none focus:ring-2 ring-pink-100 transition-all" /><span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 font-bold">{currency}</span></div>
                            <ResultView res={budgetResult} />
                        </div>
                        <div className="bg-white p-5 rounded-3xl shadow-md border border-slate-100">
                            <div className="flex items-center gap-2 mb-4 text-slate-700 font-black text-sm uppercase tracking-wider"><Icon name="target" size={16} /> 我要儲夠</div>
                            <div className="relative"><input type="number" placeholder="目標點數 (C)..." value={targetC} onChange={e => {setTargetC(e.target.value); setInputValue('');}} className="w-full bg-slate-50 p-4 rounded-2xl text-lg font-bold outline-none focus:ring-2 ring-slate-100 transition-all" /><span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 font-bold">C</span></div>
                            <ResultView res={targetResult} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
